name: gosec

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    env:
      GO111MODULE: on
    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29
      - name: Checkout Source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # No -no-fail: uploading SARIF only registers alerts, it never turns the
      # workflow red, so relying on "GitHub Security features" to gate merges
      # would let a finding through a required check. Let gosec's exit code fail
      # the job instead, and still ship the report via the upload below. This is
      # also what keeps a fork's PR gated, since it cannot upload SARIF at all.
      - name: Run Gosec Security Scanner
        uses: securego/gosec@5e5517beec77b8228ba43ec8d7cc22d82ed31924 # v2.25.0
        with:
          args: "-fmt sarif -exclude-generated -out results.sarif ./..."
      - name: Upload SARIF file
        # always(): the scan step fails on findings, and those are exactly the
        # runs whose report is worth having in the Security tab.
        # The fork check: a pull_request from a fork gets a read-only
        # GITHUB_TOKEN, so security-events: write is not actually granted and
        # the upload would error out on an otherwise valid run.
        if: >-
          always() && hashFiles('results.sarif') != '' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7fc1baf373eb073c686865bd453d412d506a05a2 # v3.35.1
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: results.sarif
