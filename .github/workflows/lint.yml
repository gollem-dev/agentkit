name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  golangci:
    name: lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout 10m ./...
      # `golangci-lint run` does not check formatting in v2 -- the formatters
      # live behind a separate `fmt` subcommand -- so without this step
      # unformatted code passes CI. The binary is on PATH here because the
      # action above calls core.addPath on its install directory.
      - name: golangci-lint fmt
        run: golangci-lint fmt --diff
      # examples/ is its own module and `./...` does not cross a module
      # boundary, so it needs its own invocation. It carries its own
      # .golangci.yml, which golangci-lint picks up from the working directory.
      - name: golangci-lint (examples)
        run: golangci-lint run --timeout 10m ./...
        working-directory: examples
      - name: golangci-lint fmt (examples)
        run: golangci-lint fmt --diff
        working-directory: examples
