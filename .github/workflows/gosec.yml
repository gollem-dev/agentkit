name: gosec

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    env:
      GO111MODULE: on
    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29
      - name: Checkout Source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # No -no-fail: uploading SARIF only registers alerts, it never turns the
      # workflow red, so relying on "GitHub Security features" to gate merges
      # would let a finding through a required check. Let gosec's exit code fail
      # the job instead, and still ship the report via the upload below. This is
      # also what keeps a fork's PR gated, since it cannot upload SARIF at all.
      # -exclude-dir=examples: gosec expands ./... by walking directories rather
      # than by asking the go tool, so it descends into the nested examples
      # module and fails trying to load packages that are not part of this one.
      # The examples job below scans them from inside their own module.
      - name: Run Gosec Security Scanner
        uses: securego/gosec@5e5517beec77b8228ba43ec8d7cc22d82ed31924 # v2.25.0
        with:
          args: "-fmt sarif -exclude-generated -exclude-dir=examples -out results.sarif ./..."
      - name: Upload SARIF file
        # always(): the scan step fails on findings, and those are exactly the
        # runs whose report is worth having in the Security tab.
        # The fork check: a pull_request from a fork gets a read-only
        # GITHUB_TOKEN, so security-events: write is not actually granted and
        # the upload would error out on an otherwise valid run.
        if: >-
          always() && hashFiles('results.sarif') != '' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7fc1baf373eb073c686865bd453d412d506a05a2 # v3.35.1
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: results.sarif

  # examples/ is a nested module and the job above cannot reach it. The reusable
  # action runs gosec in a container rooted at the workspace, with no way to
  # change directory, and gosec resolves packages within a single module: aimed
  # at ./examples/... from the root it walks the directories, scans zero files
  # and exits 0. A green check that inspected nothing is worse than no check, so
  # the same version is installed and run inside the module instead.
  examples:
    name: gosec (examples)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29
      - name: Checkout Source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum
      # Pinned to the version the action's image above actually runs, so the two
      # halves of the repository are held to the same ruleset.
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7
      # No SARIF upload here: the exit code is what gates the merge, and the
      # examples are teaching material rather than shipped library code, so
      # routing their findings into the Security tab would only add noise.
      - name: Run Gosec Security Scanner
        run: gosec -exclude-generated ./...
        working-directory: examples
